<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #fff;
    }
    .wrap {
      width: 100%;
      height: 100vh;
    }
    object, iframe, embed {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .fallback {
      font-family: Arial, sans-serif;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <object data="transcript.pdf" type="application/pdf">
      <iframe src="transcript.pdf">
        <div class="fallback">
          <p>Your browser could not display the PDF inline.</p>
          <p><a href="transcript.pdf" target="_blank" rel="noopener noreferrer">Open the PDF</a></p>
        </div>
      </iframe>
    </object>
  </div>
</body>
</html>
